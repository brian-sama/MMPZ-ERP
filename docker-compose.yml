services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=brianmagagula5@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsecrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik_data/acme.json:/letsecrypt/acme.json"
    networks:
      - mmpz_network

  db:
    image: postgres:16-alpine
    container_name: mmpz_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmpz_admin
      POSTGRES_PASSWORD: Brian7350
      POSTGRES_DB: mmpz_db
    volumes:
      - mmpz_db_data:/var/lib/postgresql/data
      - ./database:/docker-init-scripts
      - ./database/setup_db.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d mmpz_db -U mmpz_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mmpz_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmpz_erp_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mmpz_admin:Brian7350@db:5432/mmpz_db
      MMPZ_API_URL: https://mmpzmne.co.zw/api
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`mmpzmne.co.zw`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=myresolver"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    networks:
      - mmpz_network

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mmpz_erp_streamlit
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mmpz_admin:Brian7350@db:5432/mmpz_db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.streamlit.rule=Host(`mmpzmne.co.zw`) && PathPrefix(`/streamlit`)"
      - "traefik.http.routers.streamlit.entrypoints=websecure"
      - "traefik.http.routers.streamlit.tls.certresolver=myresolver"
      - "traefik.http.services.streamlit.loadbalancer.server.port=8501"
    networks:
      - mmpz_network

networks:
  mmpz_network:
    driver: bridge

volumes:
  mmpz_db_data:
