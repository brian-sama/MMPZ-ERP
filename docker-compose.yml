services:
  db:
    image: postgres:16-alpine
    container_name: mmpz_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmpz_admin
      POSTGRES_PASSWORD: Brian7350
      POSTGRES_DB: mmpz_db
    volumes:
      - mmpz_db_data:/var/lib/postgresql/data
      - ./database:/docker-init-scripts
      - ./database/setup_db.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d mmpz_db -U mmpz_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmpz_erp_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Pass the database connection URL matching the PostgreSQL service configuration
      DATABASE_URL: postgresql://mmpz_admin:Brian7350@db:5432/mmpz_db
      MMPZ_API_URL: https://mmpzmne.co.zw/api
      PORT: 3000

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mmpz_erp_streamlit
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mmpz_admin:Brian7350@db:5432/mmpz_db

  nginx:
    image: nginx:alpine
    container_name: mmpz_erp_nginx
    restart: unless-stopped
    depends_on:
      - app
      - streamlit
    ports:
      - "8093:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mmpz_db_data:
