services:
  db:
    image: postgres:16-alpine
    container_name: mmpz_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmpz_admin
      POSTGRES_PASSWORD: Brian7350
      POSTGRES_DB: mmpz_db
    volumes:
      - mmpz_db_data:/var/lib/postgresql/data
      - ./database:/docker-init-scripts
      - ./database/setup_db.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d mmpz_db -U mmpz_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mmpz_inner

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmpz_erp_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mmpz_admin:Brian7350@db:5432/mmpz_db
      MMPZ_API_URL: https://mmpzmne.co.zw/api
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.mmpz_app.rule=Host(`mmpzmne.co.zw`)"
      - "traefik.http.routers.mmpz_app.entrypoints=websecure"
      - "traefik.http.routers.mmpz_app.tls.certresolver=myresolver"
      - "traefik.http.services.mmpz_app.loadbalancer.server.port=3000"
    networks:
      - mmpz_inner
      - traefik-public
    volumes:
      - ./uploads:/app/uploads

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mmpz_erp_streamlit
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mmpz_admin:Brian7350@db:5432/mmpz_db
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.mmpz_streamlit.rule=Host(`mmpzmne.co.zw`) && PathPrefix(`/streamlit`)"
      - "traefik.http.routers.mmpz_streamlit.entrypoints=websecure"
      - "traefik.http.routers.mmpz_streamlit.tls.certresolver=myresolver"
      - "traefik.http.services.mmpz_streamlit.loadbalancer.server.port=8501"
    networks:
      - mmpz_inner
      - traefik-public

networks:
  mmpz_inner:
    driver: bridge
  traefik-public:
    external: true

volumes:
  mmpz_db_data:
