services:
  db:
    image: postgres:16-alpine
    container_name: mmpz_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MMPZ_DB_USER:-mmpz_admin}
      POSTGRES_PASSWORD: ${MMPZ_DB_PASSWORD:-mmpz}
      POSTGRES_DB: ${MMPZ_DB_NAME:-mmpz_db}
    volumes:
      - mmpz_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apps_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mmpz_erp_app
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${MMPZ_DB_USER:-mmpz_admin}:${MMPZ_DB_PASSWORD:-mmpz}@mmpz_erp_db:5432/${MMPZ_DB_NAME:-mmpz_db}
      MMPZ_API_URL: https://mmpzmne.co.zw/api
      MMPZ_AUTH_SECRET: ${MMPZ_AUTH_SECRET:-replace-with-long-random-secret}
      ERP_INTEGRATION_TOKEN: ${ERP_INTEGRATION_TOKEN:-replace-with-shared-erp-integration-token}
      ME_INTERNAL_API_URL: ${ME_INTERNAL_API_URL:-http://mmpz-compass-app:4000/api}
      ME_INTEGRATION_TOKEN: ${ME_INTEGRATION_TOKEN:-replace-with-shared-me-integration-token}
      PORT: 3000
      RUN_DB_MIGRATIONS_ON_STARTUP: "true"
      RUN_DB_SEED_ON_STARTUP: "true"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(async (response) => { const body = await response.json(); process.exit(response.ok && body.status === 'ok' ? 0 : 1); }).catch(() => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    networks:
      - apps_network
    volumes:
      - ./uploads:/app/uploads

  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: mmpz_erp_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${MMPZ_DB_USER:-mmpz_admin}:${MMPZ_DB_PASSWORD:-mmpz}@mmpz_erp_db:5432/${MMPZ_DB_NAME:-mmpz_db}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8501/streamlit/_stcore/health', timeout=5); sys.exit(0 if response.status == 200 else 1)",
        ]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 35s
    networks:
      - apps_network

networks:
  apps_network:
    external: true
    name: ${MMPZ_DOCKER_NETWORK:-apps_network}

volumes:
  mmpz_db_data:
