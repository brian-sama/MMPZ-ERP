server {
    listen 80;
    server_name mmpzmne.co.zw;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy to Streamlit dashboard (Internal Routing)
    location /streamlit/ {
        proxy_pass http://127.0.0.1:8501/;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;

        # Security: Allow framing from same origin
        add_header Content-Security-Policy "frame-ancestors 'self' mmpzmne.co.zw *.mmpzmne.co.zw";
        add_header X-Frame-Options "ALLOW-FROM https://mmpzmne.co.zw";
    }

    # Logging
    access_log /var/log/nginx/mmpzmne.access.log;
    error_log /var/log/nginx/mmpzmne.error.log;
}

server {
    listen 80;
    server_name streamlit.mmpzmne.co.zw;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security: Allow framing from same origin
        add_header Content-Security-Policy "frame-ancestors 'self' mmpzmne.co.zw *.mmpzmne.co.zw";
        add_header X-Frame-Options "ALLOW-FROM https://mmpzmne.co.zw";
    }

    # Logging
    access_log /var/log/nginx/streamlit_mmpzmne.access.log;
    error_log /var/log/nginx/streamlit_mmpzmne.error.log;
}
