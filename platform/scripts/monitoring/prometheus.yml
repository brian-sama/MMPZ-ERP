global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "django_backend"
    static_configs:
      - targets: ["127.0.0.1:8000"]
    metrics_path: /health/

  - job_name: "node_exporter"
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: "netdata"
    static_configs:
      - targets: ["127.0.0.1:19999"]
