<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMPZ Dashboard | Million Memory Project Zimbabwe</title>
  <meta name="description"
    content="MMPZ Monitoring & Evaluation Dashboard - Track indicators, manage budgets, and monitor progress for Million Memory Project Zimbabwe." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
    }

    .dark-mode {
      background-color: #020617;
      color: #f8fafc;
    }

    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .dark-mode .glass {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .mesh-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.4;
      background-color: #f8fafc;
      background-image:
        radial-gradient(at 0% 0%, hsla(271, 76%, 20%, 0.3) 0, transparent 50%),
        radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
        radial-gradient(at 100% 0%, hsla(142, 76%, 36%, 0.2) 0, transparent 50%);
    }

    .dark-mode .mesh-bg {
      opacity: 0.15;
      background-color: #020617;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: #94a3b8;
      border-radius: 10px;
    }

    .dark-mode ::-webkit-scrollbar-thumb {
      background: #334155;
    }

    /* Animation utilities */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* Smooth transitions */
    * {
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease;
    }
  </style>
</head>

<body class="transition-colors duration-500">
  <div class="mesh-bg"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
