name: Unified Portal CI

on:
  push:
    paths:
      - "platform/**"
      - ".github/workflows/unified-portal-ci.yml"
  pull_request:
    paths:
      - "platform/**"
      - ".github/workflows/unified-portal-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mmpz_erp_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mmpz_erp_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "0"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: mmpz_erp_ci
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
    defaults:
      run:
        working-directory: platform/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Django system check
        run: python manage.py check
      - name: Backend test suite
        run: python manage.py test --noinput core.permissions core.authentication core.users core.search finance membership infrastructure.queues reporting intranet.documents

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: platform/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend lint
        run: npm run lint
      - name: Frontend build
        run: npm run build
